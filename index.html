<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Bridge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; margin: 0; padding: 15px; }
        .header { background: #0088cc; color: white; text-align: center; padding: 30px; border-radius: 20px; margin-bottom: 20px; }
        .note-card { background: white; margin-bottom: 15px; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .note-card h2 { margin: 0; font-size: 18px; color: #0088cc; }
        .note-content { display: none; padding-top: 15px; border-top: 1px solid #eee; margin-top: 10px; color: #444; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Smart Bridge</h1>
        <p>የተማሪዎች ማስታወሻ</p>
    </div>
    <div class="note-card" onclick="this.querySelector('.note-content').style.display = this.querySelector('.note-content').style.display === 'block' ? 'none' : 'block'">
        <h2>Mathematics</h2>
        <div class="note-content">እዚህ ጋር ለማቲማቲክስ የሚሆን አጭር ማስታወሻ ይኖራል።</div>
    </div>
    <div class="note-card" onclick="this.querySelector('.note-content').style.display = this.querySelector('.note-content').style.display === 'block' ? 'none' : 'block'">
        <h2>Logic</h2>
        <div class="note-content">እዚህ ጋር ለሎጂክ የሚሆን አጭር ማስታወሻ ይኖራል።</div>
    </div>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
    </script>
</body>
</html>
