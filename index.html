             <h3>CHAPTER ONE: INTRODUCING PHILOSOPHY</h3>
            
            <h4>Chapter Overview</h4>
            <p>Logic is often treated simultaneously as a field of study and as an instrument.</p>
              <li>As a field of study, it is a branch of philosophy that deals with the study of arguments and the principles and methods of right reasoning.</li>
          <li>As an instrument, it is something, which we can use to formulate our own rational arguments and critically evaluate the soundness of others’ arguments.</li>
            <li>Before logic itself has become a field of study, philosophers have been using it as a basic tool to investigate issues that won their philosophical attention, such as, reality, knowledge, value, etc. Philosophy is the study of general and fundamental problems concerning matters such as existence, knowledge, truth, beauty, law, justice, validity, mind, and language.</li>
            <p>It is a rational and critical enterprise that tries to formulate and answer fundamental questions through an intensive application of reason- an application that draws on analysis, comparison, and evaluation. It involves reason, rational criticism, examination, and analysis.</p>

            <h4>Meaning and Nature of Philosophy</h4>
            <p>Because of its universal nature, it is difficult to define philosophy in terms of a specific subject matter. Because philosophy has no a specific subject matter to primarily deal with. Philosophy deals primarily with issues. What contents philosophy has are not the specific subject matters, but issues, which are universal in nature.</p>
            <p>Philosophy is not as elusive as it is often thought to be. Nor is it remote from our various problems. It is unanimously agreed that the best way to learn and understand philosophy is to philosophize; i.e., to be confronted (መጋፈጥ) with philosophical questions, to use philosophical language, to become acquainted (መተዋወቅ) with differing philosophical positions and maneuvers (ዘዴ), to read the philosophers themselves, and to grapple (መተናነቅ) with the issues for oneself.</p>
            <p>Socrates once stated that “Wonder is the feeling of a philosopher, and philosophy begins in wonder”. It is true that most of us may not have a clear knowledge about the history, nature, language, and issues of philosophy. But, we all think and reflect in our own way about issues that matter us most. We all have touched and moved by the feelings of wonder from which all philosophy derives. Thus, we all participate, more or less, in philosophical issues, even though thinking alone cannot make us philosophers.</p>
            <p>However, we can define it etymologically, the word ― philosophy comes from two Greek words:</p>
            <ul>
                <li><strong>Philo</strong> which mean love and</li>
                <li><strong>Sophia</strong> which mean wisdom.</li>
            </ul>
            <p>Thus, the literal definition of philosophy is “love of wisdom”.</p>
            <p>The ancient Greek thinker Pythagoras was the first to use the word philosopher to call a person who clearly shows a marked curiosity in the things he experiences. Anyone who raises questions, such as:</p>
            <ul>
                <li>Does God exists?</li>
                <li>What is reality?</li>
                <li>What is the ultimate source of being?</li>
                <li>What is knowledge?</li>
                <li>What does it mean to know?</li>
                <li>How do we come to know?</li>
                <li>What is value?</li>
            </ul>
            <p>Nevertheless, this is not sufficient by itself to understand philosophy, for not all wisdoms are philosophy. The wisdom that philosophers seek is not the wisdom of the expertise or technical skills of professionals. Someone may be encyclopedic, and thus seemingly intelligent, but he may actually be foolish when it comes to understanding the meaning and significance of what he knows.</p>
            <p>According to Socrates, wisdom consists of a critical habit መሰረታዊ ልማድ and eternal vigilance about all things ስለ ሁሉም ነገር ዘላለማዊ ንቃት and a reverence for truth ለእውነት አክብሮት, whatever its form, and wherever its place.</p>
            <p>Based on the Socratic understanding of wisdom, philosophy, as a pursuit of wisdom, is, thus, the development of critical habits, the continuous search for truth, and the questioning of the apparent. To interrogate the obvious means to deal creatively with the phenomenal world, to go beyond the common understanding, and to speculate about things that other people accept with no doubt.</p>
            <p>But, questioning/criticism is not the final end of philosophy, though raising the right question is often taken not only as the beginning and direction of philosophy but also as its essence. Raising the right question is an art that includes the ability to foresee (forecast) what is not readily obvious and to imagine different possibilities and alternatives of approaching the apparent. The philosophical enterprise, as Vincent Barry stated, is “an active imaginative process of formulating proper questions and resolving them by rigorous, persistent analysis”.</p>
            <p>Accordingly, we can say that Philosophy has a constructive side, for it attempts to formulate rationally defensible answers to certain fundamental questions concerning the nature of reality, the nature of value, and the nature of knowledge and truth. At the same time, its critical side is manifested when it deals with giving a rational critic, analysis, clarification, and evaluation of answers given to basic metaphysical, epistemological, and axiological questions.</p>
            <p>The other thing, which is worthy of noting, is that philosophy is an activity. It is not something that can be easily mastered or learned in schools. A philosopher is a great philosopher, not because he mastered philosophy, but because he did it. It is not his theory, but his extraordinary ability to critically think, to conceptualize, to analyze, to compare, to evaluate, and to understand- i.e., to philosophize- that makes him so. Of course, the product of philosophizing is philosophy as a product. However, what makes someone a great philosopher is not the produced philosophy, but his/her outstanding ability to philosophize.</p>

            <h4>Basic Features of Philosophy</h4>
            <p>As an academic discipline, philosophy has its own salient features that distinguishes it from other academic disciplines, be it natural, social and humanistic disciplines. The general features of philosophy can be summarized as follows:</p>
            <ul>
                <li>Philosophy is a set of views or beliefs about life and the universe, which are often held uncritically. We refer to this meaning as the informal sense of philosophy or having a philosophy. Usually when a person says my philosophy is, he or she is referring to an informal personal attitude to whatever topic is being discussed.</li>
                <li>Philosophy is a process of reflecting on and criticizing our most deeply held conceptions and beliefs. This is the formal sense of doing philosophy. These two senses of philosophy having and doing cannot be treated entirely independent of each other. If we did not have a philosophy in the formal, personal sense, then we could not do a philosophy in the critical, reflective sense. However, having a philosophy is not sufficient for doing philosophy.</li>
                <li>A genuine philosophical cannot be treated entirely independent of each other. It is open-minded and tolerant - willing to look at all sides of an issue without prejudice.</li>
                <li>To philosophize is not merely (only) to read and know philosophy; there are skills of argumentation to be mastered, techniques of analysis to be employed, and a body of material to be appropriated such that we become able to think philosophically.</li>
                <li>To philosophize also means to generalize. The accumulation of knowledge does not by itself lead to understanding, because it does not necessarily teach the mind to make a critical evaluation of facts that entail consistent and coherent judgment.</li>
                <li>Philosophers, theologians, scientists, and others disagree:
                    <ul>
                        <li>First because they view things from different points of view and with different assumptions. Their personal experiences, cultural backgrounds, and training may vary widely.</li>
                        <li>A second reason philosophers disagree is that they live in a changing universe. People change, society changes, and nature changes. Some people are responsive and sensitive to change.</li>
                        <li>A third reason philosophers disagree is that they deal with an area of human experience in which the evidence is not complete. Different people may interpret the evidence we do have in various ways.</li>
                    </ul>
                </li>
                <li>Philosophy is a rational attempt to look at the world as a whole. Philosophy seeks to combine the conclusions of the various sciences and human experience into some kind of consistent worldview. Philosophers wish to see life, not with the specialized slant of the scientist or the businessperson or the artist, but with the overall view of someone cognizant of life as a totality. Although there are difficulties and dangers in setting forth any worldview, there also are dangers in confining attention to fragments of human experience.</li>
                <li>Philosophy attempts to bring the results of human inquiry into some meaningful interpretation that provides knowledge and insight for our lives.</li>
                <li>Philosophy is the logical analysis of language and the clarification of the meaning of words and concepts.</li>
            </ul>
        </div>

               <h2 class="main-title">CHAPTER 1: INTRODUCTION</h2>
        
        <p><strong>Course Title:</strong> Geography of Ethiopia and the Horn (GeES_1011)<br>
        <strong>Target Group:</strong> Freshman Students<br>
        <strong>Instructor:</strong> Liku Mekonnen (Bahir Dar University)</p>

        <div class="section-title">1.1 Geography: Definition, Scope, Approaches and Themes</div>
        
        <span class="sub-section">Objectives:</span>
        <ul>
            <li>Comprehend the meaning and scope of Geography.</li>

        <span class="sub-section">Meaning of Geography:</span>
        <p>It is difficult to provide a single definition of geography that is acceptable to all geographers at all times and places. This is because the scope of the discipline is wide and the subject matter changes over time. However, some definitions are provided below:</p>
        <ul>
            <li>Etymologically, geography comes from the Greek words <span class="highlight">‘Geo’</span> (earth) and <span class="highlight">‘Graphia’</span> (writing or description). Therefore, geography is the description of the earth.</li>
            <li>Geography was first used by the Greek philosopher <strong>Eratosthenes</strong> (276-194 B.C).</li>
            <li>Geography is the scientific study of the earth's surface as the home of humankind.</li>
            <li>It is a discipline that studies the spatial distribution of both physical and human phenomena and their inter-relationships.</li>
        </ul>

        <span class="sub-section">Scope of Geography:</span>
        <p>The scope of Geography is the surface of the earth, which is the intersection of the four spheres:</p>
        <ol>
            <li><strong>Atmosphere:</strong> The thin layer of gases surrounding the earth.</li>
            <li><strong>Lithosphere:</strong> The solid, rocky part of the earth.</li>
            <li><strong>Hydrosphere:</strong> All the water on or near the earth's surface.</li>
            <li><strong>Biosphere:</strong> The part of the earth where life exists.</li>
        </ol>

        <span class="sub-section">Approaches in Geography:</span>
        <ul>
            <li><strong>Regional Approach:</strong> All geographical characteristics of a particular area (region) are studied together.</li>
            <li><strong>Systematic Approach:</strong> A specific geographical element or phenomenon (e.g., climate, soil, population) is studied globally.</li>
        </ul>

        <span class="sub-section">The Five Themes of Geography:</span>
        <p>Geography has five basic themes that help us understand the world:</p>
        <ul>
            <li><strong>1. Location:</strong> 
                <ul>
                    <li>Absolute Location: Expressed by Grid references (Latitude and Longitude).</li>
                    <li>Relative Location: Expressed in relation to other landmarks or countries.</li>
                </ul>
            </li>

            <li><strong>3. Human-Environment Interaction:</strong> Studies how humans adapt to, depend on, and modify their environment.</li>
            <li><strong>4. Movement:</strong> The flow of people, goods, and ideas across the earth's surface.</li>
            <li><strong>5. Region:</strong> An area that displays a certain degree of uniformity in physical or cultural traits.</li>

        <div class="section-title">1.2 Location, Shape and Size of Ethiopia and the Horn</div>
        
        <span class="sub-section">The Horn of Africa:</span>
        <p>The Horn of Africa is a region of eastern Africa that juts into the Arabian Sea. It includes the countries of <strong>Djibouti, Eritrea, Ethiopia, and Somalia</strong>. Ethiopia is the largest and most populous country in the region.</p>

        <div class="section-title">1.3 Basic Skills of Map Reading</div>
        
        <span class="sub-section">What is a Map?</span>
        <p>A map is a simplified, symbolic, and conventional representation of the earth's surface or a part of it on a flat piece of paper. It is a two-dimensional representation of a three-dimensional earth.</p>

        <span class="sub-section">Importance of Maps:</span>

            <li>Making spatial analysis of geographical phenomena.</li>
            <li>Giving location using grids and place names.</li>
            <li>Measuring area, size, and distance.</li>
            <li>Used for land-use planning, military science, aviation, and tourism.</li>

        <span class="sub-section">Marginal Information (Elements of a Map):</span>
        <p>These are details found around the frame of the map to help the reader:</p>
        <ol>
            <li><strong>Title:</strong> Tells the name of the area and what the map shows.</li>
            <li><strong>Key (Legend):</strong> Explains the symbols, signs, and colors used.</li>
            <li><strong>Scale:</strong> The ratio between the distance on the map and the actual distance on the ground.</li>
            <li><strong>North Arrow:</strong> Indicates the orientation and direction.</li>
            <li><strong>Margin:</strong> The border or frame of the map.</li>
            <li><strong>Date of Compilation:</strong> When the map was created or updated.</li>
        </ol>

        <span class="sub-section">Basic Principles of Map Reading:</span>
        <ul>
            <li>Understand conventional signs and symbols.</li>
            <li>Identify directions and determine the North arrow.</li>
            <li>Identify international and national grids for location.</li>
        </ul>
    </div>
        ];
        let currentLang = 'en';

        // --- AUTH ---
        function toggleAuth(isSignup) {
            document.getElementById('login-panel').style.display = isSignup ? 'none' : 'block';
            document.getElementById('signup-panel').style.display = isSignup ? 'block' : 'none';
        }

        function handleSignup() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !phone || !pass) return alert("Fill all fields");
            localStorage.setItem('user_' + phone, JSON.stringify({name, phone, pass}));
            alert("Success! Now Login.");
            toggleAuth(false);
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            const user = JSON.parse(localStorage.getItem('user_' + phone));
            if(user && user.pass === pass) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                updateUI();
            } else { alert("Wrong info!"); }
        }

        function logout() { localStorage.removeItem('currentUser'); location.reload(); }

        // --- CORE FUNCTIONS ---
        function navigate(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.getElementById('nav-lib').classList.toggle('active', viewId === 'library-view');
            document.getElementById('nav-prof').classList.toggle('active', viewId === 'profile-view');
        }

        function renderCourses(list) {
            const container = document.getElementById('course-container');
            container.innerHTML = list.map(c => `
                <div class="course-card" onclick="showCourse(${c.id})">
                    <div class="course-icon-bg">${c.icon}</div>
                    <div class="course-info">
                        <div class="course-name">${currentLang === 'en' ? c.name : c.amName}</div>
                        <div class="course-meta">${c.chapters} Chapters • Power Notes</div>
                    </div>
                </div>
            `).join('');
        }

        function filterCourses() {
            const query = document.getElementById('course-search').value.toLowerCase();
            const filtered = courses.filter(c => 
                c.name.toLowerCase().includes(query) || 
                c.amName.toLowerCase().includes(query)
            );
            renderCourses(filtered);
        }

        function showCourse(id) {
            const course = courses.find(c => c.id === id);
            const title = document.getElementById('selected-course-title');
            title.innerText = currentLang === 'en' ? course.name : course.amName;
            title.dataset.id = id;

            let html = '';
            for(let i=1; i<=course.chapters; i++) {
                const noteFn = (id === 1 && i === 1) ? `openNotes()` : `alert('Notes coming soon')`;
                html += `
                    <div class="chapter-card">
                        <div style="font-weight:bold; color:var(--primary-green)">Chapter ${i}</div>
                        <div class="mode-container">
                            <div class="mode-box" onclick="${noteFn}">⚡ Read Notes</div>
                            <div class="mode-box" onclick="alert('Quiz coming soon')">❓ Take Quiz</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('chapters-container').innerHTML = html;
            navigate('detail-view');
        }

        function openNotes() {
            document.getElementById('note-title').innerText = "Logic: Unit 1 Notes";
            document.getElementById('note-content').innerHTML = logicNotes.map(n => `
                <div class="note-block">
                    <h3>${n.heading}</h3>
                    <p>${n.text}</p>
                </div>
            `).join('');
            navigate('note-view');
        }

        function setLanguage(l) {
            currentLang = l;
            document.getElementById('btn-en').classList.toggle('active', l === 'en');
            document.getElementById('btn-am').classList.toggle('active', l === 'am');
            const id = document.getElementById('selected-course-title').dataset.id;
            if(id) showCourse(parseInt(id));
            renderCourses(courses);
        }

        function updateUI() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(user) {
                document.getElementById('user-display').innerText = user.name;
                document.getElementById('user-phone-display').innerText = user.phone;
                document.getElementById('auth-overlay').style.display = 'none';
            }
        }

        // --- SERVICE WORKER FOR OFFLINE ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        renderCourses(courses);
        updateUI();
    </script>
</body>
</html>
